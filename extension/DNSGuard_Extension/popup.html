<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 300px;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
        }
        .header {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            gap: 10px;
        }
        .header img { width: 28px; height: 28px; }
        .header h3 { font-size: 16px; font-weight: 700; color: white; }

        .status-box {
            text-align: center;
            padding: 20px 16px;
        }
        .status-label { font-size: 12px; color: #94a3b8; letter-spacing: 0.5px; text-transform: uppercase; }
        #site-status { font-size: 22px; margin-top: 8px; font-weight: 700; }
        .safe { color: #22c55e; }
        .suspicious { color: #eab308; }
        .malicious { color: #ef4444; }
        .unknown { color: #64748b; }

        .user-info {
            display: none;
            text-align: center;
            padding: 12px 16px;
            border-top: 1px solid rgba(255,255,255,0.06);
            font-size: 12px;
            color: #94a3b8;
        }
        .user-info strong { color: white; }
        .logout-btn {
            color: #ef4444;
            cursor: pointer;
            text-decoration: none;
            margin-left: 6px;
            font-weight: 600;
        }

        .login-box {
            display: none;
            padding: 16px;
        }
        .login-box label {
            display: block;
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .login-box input {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 13px;
            outline: none;
        }
        .login-box input::placeholder { color: #475569; }
        .login-box input:focus { border-color: rgba(34,211,238,0.5); box-shadow: 0 0 0 2px rgba(34,211,238,0.15); }
        .login-box button, .register-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        #login-btn {
            background: linear-gradient(to right, #06b6d4, #3b82f6);
            color: white;
        }
        #login-btn:hover { opacity: 0.9; }
        .register-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1) !important;
            color: #94a3b8;
            margin-top: 8px;
        }
        .register-btn:hover { border-color: rgba(34,211,238,0.3) !important; color: #22d3ee; }

        #login-error { color: #ef4444; font-size: 11px; margin-top: -4px; margin-bottom: 8px; display: none; }

        .footer {
            padding: 12px 16px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .footer a {
            color: #22d3ee;
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
        }
        .footer a:hover { color: #67e8f9; }
    </style>
</head>
<body>
    <div class="header">
        <img src="imagelogo.png" alt="DNSGuard">
        <h3>DNSGuard</h3>
    </div>

    <!-- Login Section -->
    <div id="login-section" class="login-box">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password">
        <div id="login-error"></div>
        <button id="login-btn">Sign In</button>
        <button class="register-btn" onclick="window.open('https://dnsguard-backend.onrender.com/register', '_blank')">Create Account</button>
    </div>

    <!-- Status Section -->
    <div id="status-section">
        <div class="status-box">
            <div class="status-label">Current Site Status</div>
            <div id="site-status" class="unknown">Analyzing...</div>
        </div>
        <div class="user-info" id="user-info">
            Signed in as <strong><span id="display-user"></span></strong>
            <span id="logout-btn" class="logout-btn">Logout</span>
        </div>
    </div>

    <div class="footer">
        <a href="https://dnsguard-backend.onrender.com" target="_blank">Open Dashboard →</a>
    </div>

    <script src="popup.js"></script>
</body>
</html>
