<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 300px;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
        }
        .header {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            gap: 10px;
        }
        .header img { width: 28px; height: 28px; }
        .header h3 { font-size: 16px; font-weight: 700; color: white; }

        .status-box {
            text-align: center;
            padding: 20px 16px;
        }
        .status-label { font-size: 12px; color: #94a3b8; letter-spacing: 0.5px; text-transform: uppercase; }
        #site-status { font-size: 22px; margin-top: 8px; font-weight: 700; }
        .safe { color: #22c55e; }
        .suspicious { color: #eab308; }
        .malicious { color: #ef4444; }
        .unknown { color: #64748b; }

        .user-info {
            text-align: center;
            padding: 12px 16px;
            border-top: 1px solid rgba(255,255,255,0.06);
            font-size: 12px;
            color: #94a3b8;
        }
        .user-info strong { color: white; }

        .unauth-box {
            padding: 24px 16px;
            text-align: center;
        }
        .unauth-text {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 16px;
            line-height: 1.6;
        }
        .go-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(to right, #06b6d4, #3b82f6);
            color: white;
            transition: opacity 0.2s;
        }
        .go-btn:hover { opacity: 0.9; }

        .footer {
            padding: 12px 16px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .footer a {
            color: #22d3ee;
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
        }
        .footer a:hover { color: #67e8f9; }
    </style>
</head>
<body>
    <div class="header">
        <img src="imagelogo.png" alt="DNSGuard">
        <h3>DNSGuard</h3>
    </div>

    <!-- Unauthenticated View -->
    <div id="unauth-section" class="unauth-box" style="display: none;">
        <p class="unauth-text">
            Please sign in to DNS Guard from the web application to activate browser protection.
        </p>
        <button id="go-to-login-btn" class="go-btn">Sign In</button>
    </div>

    <!-- Authenticated View -->
    <div id="auth-section" style="display: none;">
        <div class="status-box">
            <div class="status-label">Current Site Status</div>
            <div id="site-status" class="unknown">Analyzing...</div>
        </div>
        <div class="user-info" id="user-info">
            Signed in as <strong><span id="display-user"></span></strong>
        </div>
    </div>

    <div class="footer">
        <a id="dashboard-link" href="https://dnsguard-backend.onrender.com" target="_blank">Open Dashboard →</a>
    </div>

    <script src="popup.js"></script>
</body>
</html>
