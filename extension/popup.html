<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 250px;
            padding: 15px;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }
        .header {
            display: flex;
            align-items: center;
            border-bottom: 1px solid #ccc;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }
        .header h3 { margin: 0; padding-left: 10px; color: #0d6efd;}
        .status-box {
            text-align: center;
            padding: 15px;
            border-radius: 5px;
            font-weight: bold;
            background: #f8f9fa;
        }
        .safe { color: #198754; }
        .suspicious { color: #ffc107; }
        .malicious { color: #dc3545; }
        .unknown { color: #6c757d; }
        
        .footer {
            margin-top: 15px;
            text-align: center;
            font-size: 12px;
        }
        .footer a { color: #0d6efd; text-decoration: none; }
        .footer a { color: #0d6efd; text-decoration: none; }
        
        /* Login Styles */
        .login-box { display: none; padding: 10px 0; }
        .login-box input { width: 100%; padding: 5px; margin-bottom: 10px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 8px; background: #0d6efd; color: white; border: none; border-radius: 3px; cursor: pointer; }
        
        .user-info { display: none; text-align: center; margin-top: 10px; font-size: 13px; }
        .logout-btn { color: #dc3545; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <span style="font-size: 24px;">🛡️</span>
        <h3>DNSGuard</h3>
    </div>
    
    <!-- Login Section -->
    <div id="login-section" class="login-box">
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button id="login-btn">Login</button>
        <div id="login-error" style="color: red; font-size: 12px; margin-top: 5px; display: none;"></div>
    </div>

    <!-- Status Section -->
    <div id="status-section">
        <div class="status-box">
            Current Site Status:
            <div id="site-status" class="unknown" style="font-size: 20px; margin-top: 5px;">Analyzing...</div>
        </div>
        <div class="user-info" id="user-info">
            Logged in as <span id="display-user" style="font-weight:bold"></span>
            (<span id="logout-btn" class="logout-btn">Logout</span>)
        </div>
    </div>
    
    <div class="footer">
        <a href="http://localhost:5000" target="_blank">Open Dashboard</a>
    </div>

    <script src="popup.js"></script>
</body>
</html>
