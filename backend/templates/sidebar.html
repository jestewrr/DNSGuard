<aside id="sidebar" class="w-64 bg-slate-900/80 border-r border-white/5 flex-shrink-0 flex flex-col fixed h-full z-30 transition-transform -translate-x-full lg:translate-x-0">
    <div class="p-5 border-b border-white/5 flex items-center gap-3">
        <img src="{{ url_for('static', filename='imagelogo.png') }}" alt="Logo" class="w-9 h-9">
        <span class="text-lg font-bold text-white">DNSGuard</span>
    </div>
    <nav class="flex-1 p-4 space-y-1">
        <a href="/" class="sidebar-link {% if request.path == '/' %}active text-slate-300 bg-blue-500/15{% else %}text-slate-400{% endif %} flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
            Dashboard
        </a>
        
        {% if role in ('Administrator', 'Security Analyst') %}
        <a href="/admin/settings" class="sidebar-link {% if request.path == '/admin/settings' %}active text-slate-300 bg-blue-500/15{% else %}text-slate-400{% endif %} flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            Threat Management
        </a>
        {% endif %}
        
        {% if role == 'Administrator' %}
        <a href="/admin/users" class="sidebar-link {% if request.path == '/admin/users' %}active text-slate-300 bg-blue-500/15{% else %}text-slate-400{% endif %} flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            User Management
        </a>
        {% endif %}
        
        <a href="/install-extension" class="sidebar-link {% if request.path == '/install-extension' %}active text-slate-300 bg-blue-500/15{% else %}text-slate-400{% endif %} flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            Install Extension
        </a>
    </nav>
    <div class="p-4 border-t border-white/5">
        <div class="flex items-center gap-3 px-3">
            <div class="w-9 h-9 rounded-full bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center text-sm font-bold">
                {{ full_name[0] | upper if full_name else 'U' }}
            </div>
            <div class="flex-1 min-w-0">
                <p class="text-sm font-medium text-white truncate">{{ full_name }}</p>
                <p class="text-xs text-slate-500 truncate">{{ role }}</p>
            </div>
        </div>
    </div>
</aside>
