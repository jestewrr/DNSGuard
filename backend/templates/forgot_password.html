<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNSGuard — Forgot Password</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='imagelogo.png') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); }
        .glow { box-shadow: 0 0 40px rgba(59, 130, 246, 0.15); }
        .input-glow:focus { box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3); }
        @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.3; }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <div class="orb w-96 h-96 bg-blue-600 -top-48 -left-48" style="position:absolute"></div>
    <div class="orb w-80 h-80 bg-cyan-500 -bottom-40 -right-40" style="position:absolute"></div>

    <div class="max-w-md w-full relative z-10 fade-in">
        <div class="glass rounded-2xl p-8 md:p-10 glow">
            <div class="flex items-center gap-3 mb-6">
                <img src="{{ url_for('static', filename='imagelogo.png') }}" alt="DNSGuard" class="w-10 h-10">
                <h2 class="text-xl font-bold text-white">DNSGuard</h2>
            </div>

            <h2 class="text-2xl font-bold text-white mb-1">Forgot Password</h2>
            <p class="text-slate-400 text-sm mb-6">Enter your email to receive a password reset link.</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="mb-4 px-4 py-3 rounded-lg text-sm break-all
                    {% if category == 'error' %}bg-red-500/20 text-red-300 border border-red-500/30
                    {% elif category == 'success' %}bg-green-500/20 text-green-300 border border-green-500/30
                    {% else %}bg-blue-500/20 text-blue-300 border border-blue-500/30{% endif %}">
                    {{ message }}
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-6">
                    <label class="block text-slate-300 text-sm font-medium mb-2">Email Address</label>
                    <input type="email" name="email" placeholder="you@example.com" required
                        class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-slate-500 focus:outline-none input-glow transition-all">
                </div>
                <button type="submit"
                    class="w-full py-3 rounded-xl bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-semibold hover:from-cyan-400 hover:to-blue-500 transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98]">
                    Send Reset Link
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="/login" class="text-cyan-400 hover:text-cyan-300 text-sm font-medium transition">← Back to Login</a>
            </div>
        </div>
    </div>
</body>
</html>
